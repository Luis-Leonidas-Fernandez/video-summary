<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Video Study Tool</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(68, 104, 216, 0.22), transparent 46%),
          linear-gradient(180deg, #07101d 0%, #091424 100%);
        color: #eef4ff;
      }
      .shell {
        width: min(380px, calc(100vw - 48px));
        padding: 28px 24px;
        border-radius: 24px;
        background: rgba(8, 16, 31, 0.88);
        border: 1px solid rgba(150, 170, 210, 0.18);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      .eyebrow {
        margin: 0 0 10px;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #8fb2ff;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.05;
      }
      p {
        margin: 0;
        color: #b6c7ea;
        line-height: 1.5;
      }
      .loader {
        margin-top: 18px;
        width: 100%;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }
      .loader::after {
        content: "";
        display: block;
        width: 35%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #67a6ff, #87c3ff);
        animation: loading 1.2s ease-in-out infinite;
      }
      @keyframes loading {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <p class="eyebrow">Desktop shell</p>
      <h1>Iniciando Video Study Tool</h1>
      <p>Estamos levantando backend, verificando el runtime local y preparando la interfaz para que no tengas que tocar terminal.</p>
      <div class="loader" aria-hidden="true"></div>
    </section>
  </body>
</html>
